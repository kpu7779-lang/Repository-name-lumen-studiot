name = "lumen-studio"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# 部署后可通过 wrangler 命令管理
# 例如: npx wrangler pages deploy .vercel/output/static --project-name=lumen-studio

# 本地开发环境变量（用 .dev.vars 文件，见 .dev.vars.example）
# 生产环境变量在 Cloudflare Dashboard 配置

[vars]
NEXT_PUBLIC_SITE_URL = "https://lumen-studio.pages.dev"

# 敏感变量（API Key 等）用 wrangler secret put 命令配置
# 例如: npx wrangler secret put RESEND_API_KEY
